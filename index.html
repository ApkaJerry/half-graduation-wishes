<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Half Graduation Completed 🎓</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(135deg,#4f46e5,#7c3aed,#06b6d4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
text-align:center;
padding:25px;
width:95%;
max-width:420px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(.6);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.cap{
font-size:65px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

h1{
margin-top:15px;
font-size:30px;
}

p{
margin-top:12px;
font-size:17px;
opacity:.95;
}

.progress{
width:170px;
height:170px;
margin:25px auto;
position:relative;
}

.progress svg{
transform:rotate(-90deg);
}

.progress circle{
fill:none;
stroke-width:12;
stroke-linecap:round;
}

.bg{
stroke:rgba(255,255,255,.25);
}

.bar{
stroke:#00ff95;
stroke-dasharray:440;
stroke-dashoffset:220;
animation:fill 2s ease;
}

@keyframes fill{
from{stroke-dashoffset:440;}
to{stroke-dashoffset:220;}
}

.percent{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:36px;
font-weight:bold;
}

button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:40px;
background:white;
color:#4f46e5;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
opacity:.9;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

.footer{
margin-top:20px;
font-size:15px;
opacity:.9;
}

@media(max-width:480px){

h1{
font-size:25px;
}

.progress{
width:145px;
height:145px;
}

.percent{
font-size:30px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="cap">🎓</div>

<h1>Half Graduation Completed!</h1>

<p>Congratulations! You've successfully completed <b>50%</b> of your graduation journey.</p>

<div class="progress">

<svg width="170" height="170">

<circle class="bg" cx="85" cy="85" r="70"></circle>

<circle class="bar" cx="85" cy="85" r="70"></circle>

</svg>

<div class="percent">50%</div>

</div>

<button onclick="celebrate()">🎉 Celebrate Again</button>

<div class="footer">
Keep going... The finish line is getting closer! 🚀
</div>

</div>

<script>

function createConfetti(){

const colors=[
"#ff4d4d",
"#ffd93d",
"#6bcB77",
"#4d96ff",
"#ff6bcb",
"#ffffff",
"#00ffd5"
];

for(let i=0;i<180;i++){

const conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.background=
colors[Math.floor(Math.random()*colors.length)];

conf.style.width=(6+Math.random()*8)+"px";

conf.style.height=(6+Math.random()*10)+"px";

conf.style.animationDuration=
(3+Math.random()*3)+"s";

conf.style.transform=
"rotate("+Math.random()*360+"deg)";

document.body.appendChild(conf);

setTimeout(()=>{
conf.remove();
},6000);

}

}

function celebrate(){
createConfetti();
}

window.onload=createConfetti;

</script>

</body>
</html>
